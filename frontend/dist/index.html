<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bleiche Resort & Spa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;500;600&family=Noto+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <style>
    html, body {
      height: 100%;
      min-height: 100vh;
      margin: 0;
      padding: 0;
    }
    #root {
      height: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Noto Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #faf6f1;
      color: #3a3a3a;
    }

    *, *::before, *::after { box-sizing: border-box; }

    /* Scrollbar matches the old React app */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #EEE5DA; }
    ::-webkit-scrollbar-thumb { background: #C2A98C; border-radius: 0; }
    ::-webkit-scrollbar-thumb:hover { background: #8B6A43; }

    /* Print styles for the offer + Belegung print areas */
    @media print {
      body * { visibility: hidden; }
      .print-area, .print-area * { visibility: visible; }
      .print-area {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        padding: 0 !important;
        margin: 0 !important;
        box-shadow: none !important;
        border: none !important;
      }
      @page { margin: 25mm; }
    }
  </style>
<script defer src="/bundle.js"></script></head>
<body>
  <div id="root"></div>
</body>
</html>
